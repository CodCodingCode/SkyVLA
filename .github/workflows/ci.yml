name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Compile every Python file we ship. PaliGemma and AirSim imports are
      # avoided because the runner has no GPU and no upstream OpenFly-Platform
      # checkout; the syntax check still catches `SyntaxError` and
      # `IndentationError` across the whole tree.
      - name: Compile Python sources
        run: |
          python -m compileall -q \
            openfly \
            vla/vla_policy.py \
            benchmarks

      # Smoke-import the lightweight RL modules. AirSim, transformers, and
      # PaliGemma are not installed on the runner, so we only touch modules
      # that do not import the heavy stack at module load.
      - name: Import-check RL core
        run: |
          pip install --quiet numpy 'gymnasium>=1.0'
          PYTHONPATH=. python - <<'PY'
          import openfly.actions
          import openfly.episodes
          import openfly.rewards
          import openfly.rollout
          # envs module triggers gymnasium.register on import
          from openfly.envs import AirSimVLNEnv, AirSimVLNEnvConfig  # noqa: F401
          print("imports ok")
          PY

  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          use-verbose-mode: yes
          config-file: .github/markdown-link-check.json
